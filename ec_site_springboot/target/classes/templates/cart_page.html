<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>カート</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="cart-container">
        <h1>カート</h1>

        <!-- カートが空の場合 -->
        <p th:if="${#lists.isEmpty(cartItems)}">カートには商品がありません。</p>

        <!-- カートに商品がある場合 -->
        <table th:if="${!#lists.isEmpty(cartItems)}" border="1" cellpadding="5">
            <thead>
                <tr>
                    <th>商品名</th>
                    <th>価格</th>
                    <th>数量</th>
                    <th>小計</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="item : ${cartItems}">
                    <td th:text="${item.product.name}">商品名</td>
                    <td th:text="${item.product.price}">価格</td>
                    <td>
                        <form th:action="@{/cart/update}" method="post">
                            <input type="hidden" th:name="cartId" th:value="${item.id}" />
                            <input type="number" th:name="quantity" th:value="${item.quantity}" min="1"/>
                            <button type="submit">更新</button>
                        </form>
                    </td>
                    <td th:text="${item.product.price * item.quantity}">小計</td>
                    <td>
                        <form th:action="@{/cart/remove}" method="post">
                            <input type="hidden" th:name="cartId" th:value="${item.id}" />
                            <button type="submit">削除</button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>

        <!-- 合計金額 -->
        <p th:if="${!#lists.isEmpty(cartItems)}">
            合計: <span th:text="${totalPrice}">0</span> 円
        </p>

        <!-- 購入ボタン -->
        <form th:if="${!#lists.isEmpty(cartItems)}" th:action="@{/purchase}" method="post">
            <button type="submit">購入する</button>
        </form>

        <a th:href="@{/products}">商品一覧に戻る</a>
    </div>
</body>
</html>
